name: Release Train

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: release-train-master
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release-context:
    name: Resolve Release Context
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      release_sha: ${{ steps.resolve.outputs.release_sha }}
      release_ref_name: ${{ steps.resolve.outputs.release_ref_name }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
    steps:
      - name: Resolve release target
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            if [[ "${{ github.event.workflow_run.conclusion }}" != "success" || "${{ github.event.workflow_run.head_branch }}" != "master" ]]; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "release_sha=" >> "$GITHUB_OUTPUT"
              echo "release_ref_name=" >> "$GITHUB_OUTPUT"
              echo "short_sha=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            RELEASE_SHA="${{ github.event.workflow_run.head_sha }}"
            RELEASE_REF_NAME="${{ github.event.workflow_run.head_branch }}"
          else
            RELEASE_SHA="${{ github.sha }}"
            RELEASE_REF_NAME="${{ github.ref_name }}"
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "release_sha=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_ref_name=${RELEASE_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${RELEASE_SHA:0:12}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Tag the release commit
  # ---------------------------------------------------------------------------
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: [release-context]
    if: ${{ needs.release-context.outputs.should_release == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}
          fetch-depth: 0

      - name: Create release tag
        shell: bash
        run: |
          TAG="release/${{ needs.release-context.outputs.short_sha }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
          else
            git tag "${TAG}" "${{ needs.release-context.outputs.release_sha }}"
            git push origin "${TAG}"
            echo "Created tag: ${TAG}"
          fi

      - name: Summarize release
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA:** \`${{ needs.release-context.outputs.release_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Ref:** \`${{ needs.release-context.outputs.release_ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`release/${{ needs.release-context.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Deploy Web App
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [release-context]
    if: ${{ needs.release-context.outputs.should_release == 'true' && secrets.VERCEL_TOKEN != '' && vars.VERCEL_ORG_ID != '' && vars.VERCEL_WEB_PROJECT_ID != '' }}
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_WEB_PROJECT_ID }}

      - name: Build web deployment
        working-directory: apps/web
        run: vercel build --prod --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_WEB_PROJECT_ID }}

      - name: Deploy web to production
        id: deploy
        working-directory: apps/web
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" 2>&1 | grep -oE 'https://[^ ]+' | tail -1)
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_WEB_PROJECT_ID }}

      - name: Health check web deployment
        if: steps.deploy.outputs.url != ''
        run: |
          echo "Checking deployment at ${{ steps.deploy.outputs.url }}..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ steps.deploy.outputs.url }}" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "::warning::Health check did not return HTTP 200 after 5 attempts (last: $STATUS)"

  deploy-desktop-update-service:
    name: Deploy Desktop Update Endpoint
    runs-on: ubuntu-latest
    needs: [release-context]
    if: ${{ needs.release-context.outputs.should_release == 'true' && secrets.VERCEL_TOKEN != '' && vars.VERCEL_ORG_ID != '' && vars.VERCEL_DESKTOP_UPDATES_PROJECT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        working-directory: services/desktop-update-cdn
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_DESKTOP_UPDATES_PROJECT_ID }}

      - name: Build update endpoint deployment
        working-directory: services/desktop-update-cdn
        run: vercel build --prod --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_DESKTOP_UPDATES_PROJECT_ID }}

      - name: Deploy update endpoint to production
        working-directory: services/desktop-update-cdn
        run: vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_DESKTOP_UPDATES_PROJECT_ID }}

  build-and-push-api:
    name: Build And Push API Image
    runs-on: ubuntu-latest
    needs: [release-context]
    if: ${{ needs.release-context.outputs.should_release == 'true' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Set image reference
        id: image
        shell: bash
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_REF="ghcr.io/${OWNER}/the-avid-api:sha-${{ needs.release-context.outputs.short_sha }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=ghcr.io/${OWNER}/the-avid-api:latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.IMAGE_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    name: Trigger API Rollout
    runs-on: ubuntu-latest
    needs: [release-context, build-and-push-api]
    if: ${{ needs.release-context.outputs.should_release == 'true' && secrets.API_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Trigger server rollout hook
        shell: bash
        env:
          API_DEPLOY_HOOK_URL: ${{ secrets.API_DEPLOY_HOOK_URL }}
          API_DEPLOY_HOOK_BEARER: ${{ secrets.API_DEPLOY_HOOK_BEARER }}
          IMAGE_REF: ${{ needs.build-and-push-api.outputs.image_ref }}
          RELEASE_SHA: ${{ needs.release-context.outputs.release_sha }}
          RELEASE_REF_NAME: ${{ needs.release-context.outputs.release_ref_name }}
        run: |
          AUTH_HEADER=()
          if [[ -n "${API_DEPLOY_HOOK_BEARER}" ]]; then
            AUTH_HEADER=(-H "Authorization: Bearer ${API_DEPLOY_HOOK_BEARER}")
          fi

          curl --fail --show-error --silent \
            -X POST "${API_DEPLOY_HOOK_URL}" \
            "${AUTH_HEADER[@]}" \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${IMAGE_REF}\",\"sha\":\"${RELEASE_SHA}\",\"ref\":\"${RELEASE_REF_NAME}\"}"

      - name: Verify API health
        if: vars.API_HEALTH_URL != ''
        run: |
          echo "Checking API health at ${{ vars.API_HEALTH_URL }}..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ vars.API_HEALTH_URL }}" || true)
            if [ "$STATUS" = "200" ]; then
              echo "API health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "::warning::API health check did not return HTTP 200 after 6 attempts (last: $STATUS)"

  resolve-desktop-version:
    name: Resolve Desktop Release Version
    runs-on: ubuntu-latest
    needs: [release-context]
    if: ${{ needs.release-context.outputs.should_release == 'true' }}
    outputs:
      desktop_version: ${{ steps.resolve.outputs.desktop_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve desktop version
        id: resolve
        shell: bash
        env:
          DESKTOP_UPDATE_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://the-avid-desktop-updates.vercel.app/desktop-updates' }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
          DESKTOP_UPDATE_SHARED_KEY: ${{ secrets.DESKTOP_UPDATE_SHARED_KEY }}
        run: |
          DESKTOP_VERSION="$(node apps/desktop/scripts/sync-version.js --auto --print --feed-base-url="${DESKTOP_UPDATE_BASE_URL}" --channel="${DESKTOP_UPDATE_CHANNEL}")"
          echo "desktop_version=${DESKTOP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved desktop version: ${DESKTOP_VERSION}"

  build-desktop-installers:
    name: Build ${{ matrix.label }} Desktop Installer
    runs-on: ${{ matrix.os }}
    needs: [release-context, resolve-desktop-version]
    if: ${{ needs.release-context.outputs.should_release == 'true' }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
            target: mac
          - os: windows-2022
            label: Windows
            target: win
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply desktop release version
        run: npm run version:desktop -- --set=${{ needs.resolve-desktop-version.outputs.desktop_version }}

      - name: Build installer
        run: npm run dist:desktop:refresh -- --targets=${{ matrix.target }}
        env:
          DESKTOP_UPDATE_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://the-avid-desktop-updates.vercel.app/desktop-updates' }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
          DESKTOP_UPDATE_SHARED_KEY: ${{ secrets.DESKTOP_UPDATE_SHARED_KEY }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: the-avid-${{ matrix.target }}-installer
          path: apps/desktop/out/*
          if-no-files-found: error

  publish-desktop-updates:
    name: Publish Desktop Auto-Update Feed
    runs-on: ubuntu-latest
    needs: [release-context, build-desktop-installers]
    if: ${{ needs.release-context.outputs.should_release == 'true' && secrets.BLOB_READ_WRITE_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download desktop installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: the-avid-*-installer
          path: apps/desktop/out
          merge-multiple: true

      - name: Publish desktop updater artifacts
        run: npm run publish:desktop:updates -- --artifacts-dir=apps/desktop/out --channel=${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
          DESKTOP_UPDATE_BLOB_PREFIX: ${{ vars.DESKTOP_UPDATE_BLOB_PREFIX || 'desktop-updates' }}
          DESKTOP_UPDATE_PUBLIC_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://the-avid-desktop-updates.vercel.app/desktop-updates' }}

      - name: Summarize desktop download links
        shell: bash
        env:
          DESKTOP_UPDATE_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://the-avid-desktop-updates.vercel.app/desktop-updates' }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const baseUrl = process.env.DESKTOP_UPDATE_BASE_URL.replace(/\/+$/, '');
          const channel = process.env.DESKTOP_UPDATE_CHANNEL;
          const downloadBaseUrl = baseUrl.endsWith('/desktop-updates')
            ? baseUrl.replace(/\/desktop-updates$/, '/desktop-downloads')
            : baseUrl.endsWith('/desktop')
              ? baseUrl.replace(/\/desktop$/, '/desktop-downloads')
              : `${baseUrl}/desktop-downloads`;

          console.log('## Desktop downloads');
          console.log('');
          console.log(`- macOS: ${downloadBaseUrl}/${channel}/mac`);
          console.log(`- Windows: ${downloadBaseUrl}/${channel}/win`);
          NODE

  publish-mobile-update:
    name: Publish Mobile OTA Update
    runs-on: ubuntu-latest
    needs: [release-context]
    if: ${{ needs.release-context.outputs.should_release == 'true' && secrets.EXPO_TOKEN != '' && vars.EXPO_EAS_PROJECT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Publish production OTA update
        working-directory: apps/mobile
        run: npx eas-cli update --branch production --message "master ${{ needs.release-context.outputs.short_sha }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_EAS_PROJECT_ID: ${{ vars.EXPO_EAS_PROJECT_ID }}
          EXPO_UPDATES_URL: ${{ vars.EXPO_UPDATES_URL }}
          EXPO_APP_VERSION: ${{ vars.EXPO_APP_VERSION || '0.1.0' }}

  build-mobile-native:
    name: Kick Off Mobile Native Builds
    runs-on: ubuntu-latest
    needs: [release-context, publish-mobile-update]
    if: ${{ needs.release-context.outputs.should_release == 'true' && secrets.EXPO_TOKEN != '' && vars.EXPO_EAS_PROJECT_ID != '' && vars.MOBILE_BUILD_ON_MASTER == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Kick off production native builds
        working-directory: apps/mobile
        run: npx eas-cli build --platform all --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_EAS_PROJECT_ID: ${{ vars.EXPO_EAS_PROJECT_ID }}
          EXPO_UPDATES_URL: ${{ vars.EXPO_UPDATES_URL }}
          EXPO_APP_VERSION: ${{ vars.EXPO_APP_VERSION || '0.1.0' }}

  # ---------------------------------------------------------------------------
  # Release summary (runs after all deployments)
  # ---------------------------------------------------------------------------
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs:
      [
        release-context,
        tag-release,
        deploy-web,
        deploy-desktop-update-service,
        build-and-push-api,
        deploy-api,
      ]
    if: always() && needs.release-context.outputs.should_release == 'true'
    steps:
      - name: Generate release summary
        run: |
          echo "## Release Train Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release Tag | ${{ needs.tag-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web App | ${{ needs.deploy-web.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Desktop Update CDN | ${{ needs.deploy-desktop-update-service.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Image | ${{ needs.build-and-push-api.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Rollout | ${{ needs.deploy-api.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**SHA:** \`${{ needs.release-context.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
