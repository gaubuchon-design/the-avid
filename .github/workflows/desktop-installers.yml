name: Desktop Installers

on:
  workflow_dispatch:
    inputs:
      targets:
        description: Which installer set to rebuild
        required: true
        default: all
        type: choice
        options:
          - all
          - mac
          - win
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: desktop-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installers:
    name: Build ${{ matrix.label }} Installer
    runs-on: ${{ matrix.os }}
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.targets == 'all' || inputs.targets == matrix.target }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
            target: mac
            script: npm run dist:desktop:refresh -- --targets=mac
            artifact_glob: apps/desktop/out/*
          - os: windows-2022
            label: Windows
            target: win
            script: npm run dist:desktop:refresh -- --targets=win
            artifact_glob: apps/desktop/out/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.script }}
        env:
          DESKTOP_UPDATE_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://downloads.theavid.com/desktop' }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
          DESKTOP_UPDATE_SHARED_KEY: ${{ secrets.DESKTOP_UPDATE_SHARED_KEY }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: the-avid-${{ matrix.label }}-installer
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish-updater-feed:
    name: Publish Desktop Updater Feed
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-installers]
    if: ${{ secrets.BLOB_READ_WRITE_TOKEN != '' && (github.event_name != 'workflow_dispatch' || inputs.targets == 'all') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: the-avid-*-installer
          path: apps/desktop/out
          merge-multiple: true

      - name: Publish updater artifacts to Vercel Blob
        run: npm run publish:desktop:updates -- --artifacts-dir=apps/desktop/out --channel=${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
          DESKTOP_UPDATE_BLOB_PREFIX: ${{ vars.DESKTOP_UPDATE_BLOB_PREFIX || 'desktop-updates' }}
          DESKTOP_UPDATE_PUBLIC_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || '' }}
