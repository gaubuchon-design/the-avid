name: Desktop Installers

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/desktop/**'
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/desktop-installers.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-installers:
    name: Build ${{ matrix.label }} Installer
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
            script: npm run dist:desktop:mac
            artifact_glob: apps/desktop/out/*
          - os: windows-2022
            label: Windows
            script: npm run dist:desktop:win
            artifact_glob: apps/desktop/out/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.script }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: the-avid-${{ matrix.label }}-installer
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
