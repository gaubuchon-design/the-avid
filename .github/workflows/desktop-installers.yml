name: Desktop Installers

on:
  workflow_dispatch:
    inputs:
      targets:
        description: Which installer set to rebuild
        required: true
        default: all
        type: choice
        options:
          - all
          - mac
          - win
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: desktop-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-desktop-version:
    name: Resolve Desktop Release Version
    runs-on: ubuntu-latest
    outputs:
      desktop_version: ${{ steps.resolve.outputs.desktop_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve desktop version
        id: resolve
        shell: bash
        env:
          DESKTOP_UPDATE_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://the-avid-desktop-updates.vercel.app/desktop-updates' }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
          DESKTOP_UPDATE_SHARED_KEY: ${{ secrets.DESKTOP_UPDATE_SHARED_KEY }}
        run: |
          DESKTOP_VERSION="$(node apps/desktop/scripts/sync-version.js --auto --print --feed-base-url="${DESKTOP_UPDATE_BASE_URL}" --channel="${DESKTOP_UPDATE_CHANNEL}")"
          echo "desktop_version=${DESKTOP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved desktop version: ${DESKTOP_VERSION}"

  build-installers:
    name: Build ${{ matrix.label }} Installer
    runs-on: ${{ matrix.os }}
    needs: [resolve-desktop-version]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
            target: mac
            script: npm run dist:desktop:refresh -- --targets=mac
            artifact_glob: apps/desktop/out/*
          - os: windows-2022
            label: Windows
            target: win
            script: npm run dist:desktop:refresh -- --targets=win
            artifact_glob: apps/desktop/out/*

    steps:
      - name: Resolve target selection
        id: selection
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ inputs.targets }}" == "all" || "${{ inputs.targets }}" == "${{ matrix.target }}" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.selection.outputs.should_build == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.selection.outputs.should_build == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.selection.outputs.should_build == 'true' }}
        run: npm ci

      - name: Apply desktop release version
        if: ${{ steps.selection.outputs.should_build == 'true' }}
        run: npm run version:desktop -- --set=${{ needs.resolve-desktop-version.outputs.desktop_version }}

      # macOS: Import code signing certificate from base64-encoded .p12
      - name: Import macOS code signing certificate
        if: ${{ steps.selection.outputs.should_build == 'true' && matrix.target == 'mac' && secrets.CSC_LINK != '' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "Code signing certificate configured via CSC_LINK"

      - name: Build installer
        if: ${{ steps.selection.outputs.should_build == 'true' }}
        run: ${{ matrix.script }}
        env:
          DESKTOP_UPDATE_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://the-avid-desktop-updates.vercel.app/desktop-updates' }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
          DESKTOP_UPDATE_SHARED_KEY: ${{ secrets.DESKTOP_UPDATE_SHARED_KEY }}
          # macOS code signing (electron-builder reads these automatically)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # Windows code signing (if configured)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload installer artifacts
        if: ${{ steps.selection.outputs.should_build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: the-avid-${{ matrix.label }}-installer
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Skip non-selected target
        if: ${{ steps.selection.outputs.should_build != 'true' }}
        run: echo "Skipping ${{ matrix.target }} because workflow input targets=${{ inputs.targets }}."

  publish-updater-feed:
    name: Publish Desktop Updater Feed
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-installers]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.targets == 'all' }}
    steps:
      - name: Resolve publish prerequisites
        id: publish
        shell: bash
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          if [[ -n "${BLOB_READ_WRITE_TOKEN}" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.publish.outputs.should_publish == 'true' }}
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ steps.publish.outputs.should_publish == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ steps.publish.outputs.should_publish == 'true' }}
        run: npm ci

      - name: Download installer artifacts
        if: ${{ steps.publish.outputs.should_publish == 'true' }}
        uses: actions/download-artifact@v4
        with:
          pattern: the-avid-*-installer
          path: apps/desktop/out
          merge-multiple: true

      - name: Publish updater artifacts to Vercel Blob
        if: ${{ steps.publish.outputs.should_publish == 'true' }}
        run: npm run publish:desktop:updates -- --artifacts-dir=apps/desktop/out --channel=${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
          DESKTOP_UPDATE_BLOB_PREFIX: ${{ vars.DESKTOP_UPDATE_BLOB_PREFIX || 'desktop-updates' }}
          DESKTOP_UPDATE_PUBLIC_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://the-avid-desktop-updates.vercel.app/desktop-updates' }}

      - name: Summarize desktop download links
        if: ${{ steps.publish.outputs.should_publish == 'true' }}
        shell: bash
        env:
          DESKTOP_UPDATE_BASE_URL: ${{ vars.DESKTOP_UPDATE_BASE_URL || 'https://the-avid-desktop-updates.vercel.app/desktop-updates' }}
          DESKTOP_UPDATE_CHANNEL: ${{ vars.DESKTOP_UPDATE_CHANNEL || 'stable' }}
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const baseUrl = process.env.DESKTOP_UPDATE_BASE_URL.replace(/\/+$/, '');
          const channel = process.env.DESKTOP_UPDATE_CHANNEL;
          const downloadBaseUrl = baseUrl.endsWith('/desktop-updates')
            ? baseUrl.replace(/\/desktop-updates$/, '/desktop-downloads')
            : baseUrl.endsWith('/desktop')
              ? baseUrl.replace(/\/desktop$/, '/desktop-downloads')
              : `${baseUrl}/desktop-downloads`;

          console.log('## Desktop downloads');
          console.log('');
          console.log(`- macOS: ${downloadBaseUrl}/${channel}/mac`);
          console.log(`- Windows: ${downloadBaseUrl}/${channel}/win`);
          NODE

      - name: Skip updater publish without blob credentials
        if: ${{ steps.publish.outputs.should_publish != 'true' }}
        run: echo "Skipping updater publish because BLOB_READ_WRITE_TOKEN is not configured."
