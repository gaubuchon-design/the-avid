# =============================================================================
# The Avid - Docker Compose (Development)
# =============================================================================
#
# Usage:
#   docker compose up -d              Start all services
#   docker compose up -d postgres     Start only PostgreSQL
#   docker compose logs -f api        Follow API logs
#   docker compose down               Stop all services
#   docker compose down -v            Stop all services and remove volumes
#
# Environment Variables:
#   See .env.example at the project root for all configurable values.
#   Copy to .env and adjust as needed. Docker Compose will auto-load .env.
#
# Services:
#   postgres   - PostgreSQL 16 (port 5432)
#   redis      - Redis 7 with AOF persistence (port 6379)
#   minio      - S3-compatible object storage (API: 9000, Console: 9001)
#   minio-init - One-shot bucket initializer
#   api        - Express API server (port 4000)
# =============================================================================

services:
  # --- PostgreSQL ---------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: avid_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      # POSTGRES_USER       - Database superuser name (default: avid)
      # POSTGRES_PASSWORD   - Database superuser password (default: avid_dev_password)
      # POSTGRES_DB         - Default database name (default: avid_db)
      POSTGRES_USER: ${POSTGRES_USER:-avid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avid_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-avid_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount custom init scripts (*.sql, *.sh) for first-run initialization
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avid} -d ${POSTGRES_DB:-avid_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - avid-network
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Redis --------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: avid_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - avid-network
    deploy:
      resources:
        limits:
          memory: 256M

  # --- MinIO (local S3-compatible storage) --------------------------------------
  minio:
    image: minio/minio:latest
    container_name: avid_minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"    # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    environment:
      # MINIO_ROOT_USER     - MinIO admin username (default: minioadmin)
      # MINIO_ROOT_PASSWORD - MinIO admin password (default: minioadmin)
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - avid-network
    deploy:
      resources:
        limits:
          memory: 512M

  # --- MinIO bucket initialization ----------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: avid_minio_init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/${S3_BUCKET_MEDIA:-avid-media-assets};
        mc mb --ignore-existing local/${S3_BUCKET_PROXIES:-avid-media-proxies};
        mc mb --ignore-existing local/${S3_BUCKET_EXPORTS:-avid-exports};
        mc anonymous set download local/${S3_BUCKET_PROXIES:-avid-media-proxies};
        echo 'MinIO buckets initialized successfully';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-avid-media-assets}
      S3_BUCKET_PROXIES: ${S3_BUCKET_PROXIES:-avid-media-proxies}
      S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-avid-exports}
    networks:
      - avid-network

  # --- API Server ---------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: development
    container_name: avid_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      # NODE_ENV              - Runtime environment (development | production | test)
      # PORT                  - API listen port (default: 4000)
      # DATABASE_URL          - PostgreSQL connection string
      # REDIS_URL             - Redis connection string
      # S3_ENDPOINT           - S3/MinIO endpoint URL
      # AWS_REGION            - AWS region for S3 (default: us-east-1)
      # AWS_ACCESS_KEY_ID     - S3 access key
      # AWS_SECRET_ACCESS_KEY - S3 secret key
      # S3_BUCKET_MEDIA       - Bucket for raw media assets
      # S3_BUCKET_PROXIES     - Bucket for proxy/preview media
      # S3_BUCKET_EXPORTS     - Bucket for exported renders
      # JWT_SECRET            - Secret key for JWT signing (CHANGE IN PRODUCTION)
      # ALLOWED_ORIGINS       - Comma-separated list of allowed CORS origins
      # LOG_LEVEL             - Logging verbosity (debug | info | warn | error)
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-avid}:${POSTGRES_PASSWORD:-avid_dev_password}@postgres:5432/${POSTGRES_DB:-avid_db}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-avid-media-assets}
      S3_BUCKET_PROXIES: ${S3_BUCKET_PROXIES:-avid-media-proxies}
      S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-avid-exports}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro
      - ./libs:/app/libs:ro
      - api_node_modules:/app/node_modules
    networks:
      - avid-network
    deploy:
      resources:
        limits:
          memory: 1G
    develop:
      watch:
        - action: sync
          path: apps/api/src
          target: /app/apps/api/src
        - action: rebuild
          path: apps/api/package.json

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  api_node_modules:
    driver: local

networks:
  avid-network:
    driver: bridge
    name: avid-network
