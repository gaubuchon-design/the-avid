services:
  # --- PostgreSQL ---------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: avid_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: avid
      POSTGRES_PASSWORD: avid_dev_password
      POSTGRES_DB: avid_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avid -d avid_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - avid-network
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Redis --------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: avid_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - avid-network
    deploy:
      resources:
        limits:
          memory: 256M

  # --- MinIO (local S3-compatible storage) --------------------------------------
  minio:
    image: minio/minio:latest
    container_name: avid_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - avid-network
    deploy:
      resources:
        limits:
          memory: 512M

  # --- MinIO bucket initialization ----------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: avid_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/avid-media-assets;
        mc mb --ignore-existing local/avid-media-proxies;
        mc mb --ignore-existing local/avid-exports;
        echo 'MinIO buckets initialized successfully';
      "
    networks:
      - avid-network

  # --- API Server ---------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: avid_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://avid:avid_dev_password@postgres:5432/avid_db
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_MEDIA: avid-media-assets
      S3_BUCKET_PROXIES: avid-media-proxies
      S3_BUCKET_EXPORTS: avid-exports
      JWT_SECRET: dev-secret-change-in-production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./apps/api:/app/apps/api
      - /app/node_modules
    networks:
      - avid-network
    deploy:
      resources:
        limits:
          memory: 1G
    develop:
      watch:
        - action: rebuild
          path: apps/api/src

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  avid-network:
    driver: bridge
    name: avid-network
